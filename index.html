<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Out of the Shadow</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div id="progression-bar">
                <div id="progression-fill"></div>
            </div>
            <div id="score-text">Cave Depth: 0</div>
        </header>

        <main id="screens">
            <!-- Start Screen -->
            <section id="start-screen" class="screen active">
                <h1>Out of the Shadow</h1>
                <p>Welcome to Plato's Cave. Can you distinguish Truth from Media Myth?</p>
                <button id="start-btn" class="btn primary">Enter the Cave</button>
            </section>

            <!-- Game Screen -->
            <section id="game-screen" class="screen">
                <div class="timer-container">
                    <svg class="timer-svg" viewBox="0 0 100 100">
                        <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
                        <circle class="timer-progress" cx="50" cy="50" r="45"></circle>
                    </svg>
                    <div id="timer-text">10</div>
                </div>

                <div class="card-container">
                    <div id="card" class="card">
                        <div class="card-inner">
                            <div class="card-front">
                                <p id="statement-text">Statement goes here...</p>
                            </div>
                            <div class="card-back">
                                <h2 id="result-title">Correct!</h2>
                                <p id="explanation-text">Explanation goes here...</p>
                                <button id="next-btn" class="btn secondary">Next</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button id="btn-shadow" class="btn shadow-btn">Shadow (False)</button>
                    <button id="btn-truth" class="btn truth-btn">Truth (True)</button>
                </div>
            </section>

            <!-- End Screen -->
            <section id="end-screen" class="screen">
                <h1 id="end-title">You Reached the Light!</h1>
                <p id="end-message">You have escaped the cave of ignorance.</p>
                <button id="restart-btn" class="btn primary">Play Again</button>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
