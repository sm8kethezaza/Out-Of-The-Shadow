<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Out of the Shadow | CPE 494</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Audio Elements -->
    <!-- Lo-Fi background music (Royalty Free URL) -->
    <audio id="bgm" loop preload="auto" src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf7f6.mp3"></audio>

    <div id="flash-overlay"></div>
    
    <div id="app">
        <header>
            <div class="header-buttons">
                <button id="home-btn" class="icon-btn">🏠 Home</button>
                <button id="mute-btn" class="icon-btn">🔈 Muted</button>
            </div>
            <div id="progression-container">
                <div id="progression-bar">
                    <div id="progression-fill"></div>
                </div>
                <div id="score-text">Level: 3/10</div>
            </div>
        </header>

        <main id="screens">
            <!-- Start Screen -->
            <section id="start-screen" class="screen active">
                <h1>Out of the Shadow</h1>
                <p>CPE 494: Digital Creativity & Rethinking Interaction.</p>
                <p>Welcome to Plato's Cave. Can you distinguish geopolitical Truth from Media Myth?</p>
                <button id="start-btn" class="btn primary">Enter the Cave</button>
            </section>

            <!-- Game Screen -->
            <section id="game-screen" class="screen">
                <div class="timer-container" id="timer-container">
                    <svg class="timer-svg" viewBox="0 0 100 100">
                        <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
                        <circle class="timer-progress" cx="50" cy="50" r="45"></circle>
                    </svg>
                    <div id="timer-text">10</div>
                </div>

                <div class="card-container">
                    <div id="card" class="card">
                        <!-- FRONT OF CARD -->
                        <div class="card-front">
                            <p id="statement-text">Statement goes here...</p>
                        </div>
                        
                        <!-- BACK OF CARD -->
                        <div class="card-back">
                            <h2 id="result-title">Feedback</h2>
                            <div class="debriefing-box">
                                <span class="debriefing-label">GEOPOLITICAL DEBRIEFING:</span>
                                <p id="explanation-text">Explanation goes here...</p>
                            </div>
                            <button id="next-btn" class="btn secondary">Next Question</button>
                        </div>
                    </div>
                </div>

                <div class="actions" id="actions-container">
                    <button id="btn-shadow" class="btn shadow-btn">Shadow (Myth)</button>
                    <button id="btn-truth" class="btn truth-btn">Truth (Fact)</button>
                </div>
            </section>

            <!-- End Screen -->
            <section id="end-screen" class="screen">
                <h1 id="end-title">Game Over</h1>
                <p id="end-message">Outcome message.</p>
                <button id="restart-btn" class="btn primary">Play Again</button>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
